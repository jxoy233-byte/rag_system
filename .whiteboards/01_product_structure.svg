  <text x="700" y="1170" font-size="12" fill="#FFFFFF" text-anchor="middle">GPT-4o-mini · DeepSeek</text>
  <text x="700" y="1190" font-size="12" fill="#FFFFFF" text-anchor="middle">自定义 base_url</text>

