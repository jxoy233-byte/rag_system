  <text x="950" y="1170" font-size="12" fill="#FFFFFF" text-anchor="middle">Qwen3-VL-2B (local)</text>
  <text x="950" y="1190" font-size="12" fill="#FFFFFF" text-anchor="middle">OpenAI 兼容 VLM</text>

  <!-- Splitters -->
  <rect x="1080" y="1120" width="180" height="80" fill="#04B24F" rx="4"/>
  <text x="1170" y="1148" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Splitters</text>
  <text x="1170" y="1170" font-size="12" fill="#FFFFFF" text-anchor="middle">Recursive</text>
  <text x="1170" y="1190" font-size="12" fill="#FFFFFF" text-anchor="middle">chunk 600 / 120</text>

  <!-- Loaders -->
  <rect x="1280" y="1120" width="180" height="80" fill="#04B24F" rx="4"/>
  <text x="1370" y="1148" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Loaders</text>
  <text x="1370" y="1170" font-size="12" fill="#FFFFFF" text-anchor="middle">PDF · DOCX · PPTX</text>
  <text x="1370" y="1190" font-size="12" fill="#FFFFFF" text-anchor="middle">MD · TXT · CSV · XLSX</text>

  <!-- Chroma -->
  <rect x="1480" y="1120" width="200" height="80" fill="#044D99" rx="4"/>
  <text x="1580" y="1148" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">ChromaDB</text>
  <text x="1580" y="1170" font-size="12" fill="#FFFFFF" text-anchor="middle">collection / KB</text>
  <text x="1580" y="1190" font-size="12" fill="#FFFFFF" text-anchor="middle">向量持久化</text>

