<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 1340" font-family="Noto Sans SC">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4"
            orient="auto" markerUnits="strokeWidth"><path d="M0 0 L10 4 L0 8 z"/></marker>
  </defs>

  <rect width="1640" height="1340" fill="#E4D2C4"/>

  <text x="80" y="92" font-size="44" font-weight="700" fill="#1F1A14" letter-spacing="2">核心逻辑 · 端到端数据流</text>
  <text x="80" y="128" font-size="18" font-weight="400" fill="#1F1A14">入库写入 → 双索引存储 → 混合检索（向量+BM25+RRF+Rerank） → 生成 → SSE 流式输出</text>
  <line x1="80" y1="150" x2="1560" y2="150" stroke="#1F1A14" stroke-width="2"/>

  <!-- ============== TOP RAIL: INGEST ============== -->
  <text x="80" y="195" font-size="20" font-weight="700" fill="#1F1A14" letter-spacing="3">写入轨 · IngestService（asyncio.to_thread）</text>

  <!-- file source -->
  <rect x="80" y="215" width="160" height="110" fill="#FFFFFF" stroke="#1F1A14" stroke-width="2" rx="4"/>
  <text x="160" y="248" font-size="18" font-weight="700" fill="#1F1A14" text-anchor="middle">上传文件</text>
  <text x="160" y="276" font-size="13" fill="#1F1A14" text-anchor="middle">PDF · DOCX</text>
  <text x="160" y="298" font-size="13" fill="#1F1A14" text-anchor="middle">MD · TXT · CSV</text>
  <text x="160" y="318" font-size="12" fill="#1F1A14" text-anchor="middle" font-style="italic">data/uploads/{slug}/</text>

  <!-- loader -->
  <rect x="280" y="215" width="180" height="110" fill="#04B24F" rx="4"/>
  <text x="370" y="248" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">DocumentLoader</text>
  <text x="370" y="276" font-size="13" fill="#FFFFFF" text-anchor="middle">按后缀选 loader</text>
  <text x="370" y="298" font-size="13" fill="#FFFFFF" text-anchor="middle">提取段落 / 页码 / 表格</text>
  <text x="370" y="318" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">LoaderFactory</text>

  <!-- splitter -->
  <rect x="500" y="215" width="180" height="110" fill="#04B24F" rx="4"/>
  <text x="590" y="248" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">Recursive</text>
  <text x="590" y="272" font-size="16" fill="#FFFFFF" text-anchor="middle">Splitter</text>
  <text x="590" y="298" font-size="13" fill="#FFFFFF" text-anchor="middle">chunk 600 / 120</text>
  <text x="590" y="318" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">保留 section / page</text>

  <!-- embed -->
  <rect x="720" y="215" width="200" height="110" fill="#04B24F" rx="4"/>
  <text x="820" y="248" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">Embedding</text>
  <text x="820" y="276" font-size="13" fill="#FFFFFF" text-anchor="middle">BGE-M3 (local)</text>
  <text x="820" y="298" font-size="13" fill="#FFFFFF" text-anchor="middle">向量化所有 chunks</text>
  <text x="820" y="318" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">EmbeddingFactory</text>

  <!-- dual write -->
  <rect x="960" y="215" width="220" height="110" fill="#044D99" rx="4"/>
  <text x="1070" y="248" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">双写</text>
  <text x="1070" y="276" font-size="13" fill="#FFFFFF" text-anchor="middle">ChromaStore.add()</text>
  <text x="1070" y="298" font-size="13" fill="#FFFFFF" text-anchor="middle">BM25Store.add()</text>
  <text x="1070" y="318" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">同 chunk_id 对齐</text>

  <!-- metadata -->
  <rect x="1220" y="215" width="180" height="110" fill="#044D99" rx="4"/>
  <text x="1310" y="248" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">元数据</text>
  <text x="1310" y="276" font-size="13" fill="#FFFFFF" text-anchor="middle">SQLite</text>
  <text x="1310" y="298" font-size="13" fill="#FFFFFF" text-anchor="middle">KB · Document · status</text>
  <text x="1310" y="318" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">chunk_count / doc_count</text>

  <!-- status block -->
  <rect x="1440" y="215" width="160" height="110" fill="#F61B27" rx="4"/>
  <text x="1520" y="248" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">status</text>
  <text x="1520" y="276" font-size="13" fill="#FFFFFF" text-anchor="middle">processing</text>
  <text x="1520" y="298" font-size="13" fill="#FFFFFF" text-anchor="middle">ready / failed</text>
  <text x="1520" y="318" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">后台 BackgroundTasks</text>

  <!-- arrows: file → loader → splitter → embed → dual → meta → status -->
  <line x1="240" y1="270" x2="278" y2="270" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="460" y1="270" x2="498" y2="270" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="680" y1="270" x2="718" y2="270" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="920" y1="270" x2="958" y2="270" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1180" y1="270" x2="1218" y2="270" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1400" y1="270" x2="1438" y2="270" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ============== STORAGE LAYER (CENTER) ============== -->
  <text x="80" y="380" font-size="20" font-weight="700" fill="#1F1A14" letter-spacing="3">存储层 · data/</text>

  <!-- filesystem -->
  <rect x="80" y="400" width="380" height="160" fill="#FFFFFF" stroke="#1F1A14" stroke-width="2" rx="4"/>
  <text x="270" y="430" font-size="18" font-weight="700" fill="#1F1A14" text-anchor="middle">本地文件系统</text>
  <text x="270" y="458" font-size="13" fill="#1F1A14" text-anchor="middle">data/uploads/{kb_slug}/</text>
  <text x="270" y="482" font-size="13" fill="#1F1A14" text-anchor="middle">原始文件 · move_upload_to_kb_dir</text>
  <text x="270" y="506" font-size="13" fill="#1F1A14" text-anchor="middle">delete_kb → 清理孤儿文件</text>
  <text x="270" y="548" font-size="12" fill="#1F1A14" text-anchor="middle" font-style="italic">retry_document 重新 move</text>

  <!-- chroma -->
  <rect x="500" y="400" width="380" height="160" fill="#044D99" rx="6"/>
  <text x="690" y="430" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">ChromaDB 向量库</text>
  <text x="690" y="458" font-size="13" fill="#FFFFFF" text-anchor="middle">持久化目录 · collection 按 KB 隔离</text>
  <text x="690" y="482" font-size="13" fill="#FFFFFF" text-anchor="middle">data/chroma/</text>
  <text x="690" y="506" font-size="13" fill="#FFFFFF" text-anchor="middle">query / add / delete_by_doc_id / reset</text>
  <text x="690" y="548" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">embedding 维度 = kb.embedding_dim</text>

  <!-- bm25 -->
  <rect x="920" y="400" width="380" height="160" fill="#04B24F" rx="6"/>
  <text x="1110" y="430" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">BM25 索引（Pickle）</text>
  <text x="1110" y="458" font-size="13" fill="#FFFFFF" text-anchor="middle">data/bm25/{kb_id}.pkl</text>
  <text x="1110" y="482" font-size="13" fill="#FFFFFF" text-anchor="middle">中文：rank_bm25 + jieba 分词</text>
  <text x="1110" y="506" font-size="13" fill="#FFFFFF" text-anchor="middle">BM25Store.for_kb(kb_id) 单例缓存</text>
  <text x="1110" y="548" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">delete_kb → reset + 清缓存</text>

  <!-- sqlite -->
  <rect x="1340" y="400" width="260" height="160" fill="#FFFFFF" stroke="#1F1A14" stroke-width="2" rx="4"/>
  <text x="1470" y="430" font-size="18" font-weight="700" fill="#1F1A14" text-anchor="middle">SQLite · 元数据</text>
  <text x="1470" y="458" font-size="13" fill="#1F1A14" text-anchor="middle">data/metadata.db</text>
  <text x="1470" y="482" font-size="13" fill="#1F1A14" text-anchor="middle">KnowledgeBase · Document</text>
  <text x="1470" y="506" font-size="13" fill="#1F1A14" text-anchor="middle">Conversation · Message</text>
  <text x="1470" y="548" font-size="12" fill="#1F1A14" text-anchor="middle" font-style="italic">async SQLAlchemy 2</text>

  <!-- vertical arrows from ingest row to storage -->
  <line x1="370" y1="325" x2="370" y2="398" stroke="#1F1A14" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="590" y1="325" x2="590" y2="398" stroke="#1F1A14" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="820" y1="325" x2="820" y2="398" stroke="#1F1A14" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1070" y1="325" x2="690" y2="398" stroke="#1F1A14" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1070" y1="325" x2="1110" y2="398" stroke="#1F1A14" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1310" y1="325" x2="1470" y2="398" stroke="#1F1A14" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============== HYBRID RETRIEVER (ZOOMED) ============== -->
  <text x="80" y="615" font-size="20" font-weight="700" fill="#1F1A14" letter-spacing="3">混合检索放大 · HybridRetriever.retrieve()</text>

  <rect x="80" y="635" width="1480" height="280" fill="#FFFFFF" stroke="#1F1A14" stroke-width="2" rx="6"/>

  <!-- query -->
  <rect x="110" y="720" width="180" height="80" fill="#FFFFFF" stroke="#1F1A14" stroke-width="2" rx="4"/>
  <text x="200" y="752" font-size="16" font-weight="700" fill="#1F1A14" text-anchor="middle">query</text>
  <text x="200" y="774" font-size="12" fill="#1F1A14" text-anchor="middle">用户问题</text>
  <text x="200" y="792" font-size="12" fill="#1F1A14" text-anchor="middle" font-style="italic">state.question</text>

  <!-- branch 1: vector -->
  <rect x="330" y="660" width="240" height="100" fill="#044D99" rx="4"/>
  <text x="450" y="692" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">向量检索</text>
  <text x="450" y="714" font-size="13" fill="#FFFFFF" text-anchor="middle">Embedding(query) · to_thread</text>
  <text x="450" y="736" font-size="13" fill="#FFFFFF" text-anchor="middle">ChromaStore.query</text>
  <text x="450" y="754" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">rerank_top_k = 20</text>

  <!-- branch 2: bm25 -->
  <rect x="330" y="780" width="240" height="100" fill="#04B24F" rx="4"/>
  <text x="450" y="812" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">BM25 检索</text>
  <text x="450" y="834" font-size="13" fill="#FFFFFF" text-anchor="middle">jieba 分词 · to_thread</text>
  <text x="450" y="856" font-size="13" fill="#FFFFFF" text-anchor="middle">BM25Store.query</text>
  <text x="450" y="874" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">rerank_top_k = 20</text>

  <!-- RRF fuse -->
  <rect x="620" y="720" width="220" height="140" fill="#044D99" rx="6"/>
  <text x="730" y="754" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">RRF 融合</text>
  <text x="730" y="780" font-size="13" fill="#FFFFFF" text-anchor="middle">_rrf_fuse()</text>
  <text x="730" y="804" font-size="13" fill="#FFFFFF" text-anchor="middle">score = Σ 1 / (60 + rank + 1)</text>
  <text x="730" y="828" font-size="13" fill="#FFFFFF" text-anchor="middle">两路同时命中 → fused</text>
  <text x="730" y="850" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">单路 → source 标记</text>

  <!-- Rerank -->
  <rect x="890" y="720" width="240" height="140" fill="#044D99" rx="6"/>
  <text x="1010" y="754" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">BGE-Reranker</text>
  <text x="1010" y="780" font-size="13" fill="#FFFFFF" text-anchor="middle">Cross-Encoder</text>
  <text x="1010" y="804" font-size="13" fill="#FFFFFF" text-anchor="middle">rerank(query, texts, k)</text>
  <text x="1010" y="828" font-size="13" fill="#FFFFFF" text-anchor="middle">按 rerank_score 降序</text>
  <text x="1010" y="850" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">final_top_k = 5</text>

  <!-- Top-K chunks -->
  <rect x="1180" y="720" width="340" height="140" fill="#FFFFFF" stroke="#1F1A14" stroke-width="2" rx="4"/>
  <text x="1350" y="752" font-size="18" font-weight="700" fill="#1F1A14" text-anchor="middle">Top-K Chunks</text>
  <text x="1350" y="780" font-size="13" fill="#1F1A14" text-anchor="middle">id · text · metadata</text>
  <text x="1350" y="804" font-size="13" fill="#1F1A14" text-anchor="middle">score · rerank_score</text>
  <text x="1350" y="828" font-size="13" fill="#1F1A14" text-anchor="middle">source: vector / bm25 / fused</text>
  <text x="1350" y="850" font-size="12" fill="#1F1A14" text-anchor="middle" font-style="italic">给 build_prompt 拼上下文</text>

  <!-- arrows -->
  <line x1="290" y1="745" x2="328" y2="700" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="290" y1="775" x2="328" y2="820" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="570" y1="700" x2="618" y2="760" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="570" y1="820" x2="618" y2="820" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="840" y1="790" x2="888" y2="790" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1130" y1="790" x2="1178" y2="790" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- gather hint -->
  <text x="450" y="650" font-size="12" fill="#1F1A14" text-anchor="middle" font-style="italic">asyncio.gather 并行</text>

  <!-- ============== BOTTOM RAIL: GENERATE ============== -->
  <text x="80" y="965" font-size="20" font-weight="700" fill="#1F1A14" letter-spacing="3">生成轨 · RAGAgent.astream()</text>

  <!-- prompt builder -->
  <rect x="80" y="985" width="280" height="140" fill="#04B24F" rx="6"/>
  <text x="220" y="1015" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">build_prompt</text>
  <text x="220" y="1043" font-size="13" fill="#FFFFFF" text-anchor="middle">按 intent 选模板</text>
  <text x="220" y="1065" font-size="13" fill="#FFFFFF" text-anchor="middle">_format_chunks · _format_web</text>
  <text x="220" y="1087" font-size="13" fill="#FFFFFF" text-anchor="middle">注入最近 6 条历史</text>
  <text x="220" y="1109" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">[n] 编号引用</text>

  <!-- llm stream -->
  <rect x="400" y="985" width="280" height="140" fill="#044D99" rx="6"/>
  <text x="540" y="1015" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">LLM stream</text>
  <text x="540" y="1043" font-size="13" fill="#FFFFFF" text-anchor="middle">LLMFactory.stream_chat()</text>
  <text x="540" y="1065" font-size="13" fill="#FFFFFF" text-anchor="middle">逐 token yield</text>
  <text x="540" y="1087" font-size="13" fill="#FFFFFF" text-anchor="middle">AgentEvent(type=token)</text>
  <text x="540" y="1109" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">首 token &lt; 2s</text>

  <!-- sources build -->
  <rect x="720" y="985" width="280" height="140" fill="#04B24F" rx="6"/>
  <text x="860" y="1015" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">_build_sources</text>
  <text x="860" y="1043" font-size="13" fill="#FFFFFF" text-anchor="middle">chunks → SourceItem[]</text>
  <text x="860" y="1065" font-size="13" fill="#FFFFFF" text-anchor="middle">web → source_type=web</text>
  <text x="860" y="1087" font-size="13" fill="#FFFFFF" text-anchor="middle">doc_title · page · score</text>
  <text x="860" y="1109" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">前端 SourceList</text>

  <!-- persist -->
  <rect x="1040" y="985" width="280" height="140" fill="#044D99" rx="6"/>
  <text x="1180" y="1015" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">_persist_turn</text>
  <text x="1180" y="1043" font-size="13" fill="#FFFFFF" text-anchor="middle">写入 Conversation + Message</text>
  <text x="1180" y="1065" font-size="13" fill="#FFFFFF" text-anchor="middle">sources_json 持久化</text>
  <text x="1180" y="1087" font-size="13" fill="#FFFFFF" text-anchor="middle">commit → 返回 conv_id</text>
  <text x="1180" y="1109" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">失败 → error 事件</text>

  <!-- SSE emit -->
  <rect x="1360" y="985" width="220" height="140" fill="#F61B27" rx="6"/>
  <text x="1470" y="1015" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">SSE emit</text>
  <text x="1470" y="1043" font-size="13" fill="#FFFFFF" text-anchor="middle">intent → sources</text>
  <text x="1470" y="1065" font-size="13" fill="#FFFFFF" text-anchor="middle">token* → meta → final</text>
  <text x="1470" y="1087" font-size="13" fill="#FFFFFF" text-anchor="middle">end (ping=15)</text>
  <text x="1470" y="1109" font-size="12" fill="#FFFFFF" text-anchor="middle" font-style="italic">前端 ofetch 解析</text>

  <!-- arrows bottom rail -->
  <line x1="360" y1="1055" x2="398" y2="1055" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="680" y1="1055" x2="718" y2="1055" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1000" y1="1055" x2="1038" y2="1055" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1320" y1="1055" x2="1358" y2="1055" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- vertical arrow from hybrid retriever output to build_prompt -->
  <polyline points="1350,860 1350,940 220,940 220,983" fill="none" stroke="#1F1A14" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="780" y="935" font-size="13" font-weight="700" fill="#1F1A14" text-anchor="middle">chunks →</text>

  <!-- ============== INVARIANTS / CONTRACTS ============== -->
  <text x="80" y="1180" font-size="20" font-weight="700" fill="#1F1A14" letter-spacing="3">不变量与契约</text>

  <rect x="80" y="1200" width="380" height="100" fill="#FFFFFF" stroke="#1F1A14" stroke-width="2" rx="4"/>
  <text x="270" y="1228" font-size="15" font-weight="700" fill="#1F1A14" text-anchor="middle">chunk_id 对齐</text>
  <text x="270" y="1252" font-size="13" fill="#1F1A14" text-anchor="middle">Chroma 与 BM25 共用同一个 uuid</text>
  <text x="270" y="1274" font-size="12" fill="#1F1A14" text-anchor="middle" font-style="italic">RRF 才能按 id 合并两路</text>
  <text x="270" y="1292" font-size="12" fill="#1F1A14" text-anchor="middle" font-style="italic">delete_by_doc_id 必须双删</text>

  <rect x="500" y="1200" width="380" height="100" fill="#FFFFFF" stroke="#1F1A14" stroke-width="2" rx="4"/>
  <text x="690" y="1228" font-size="15" font-weight="700" fill="#1F1A14" text-anchor="middle">异步边界</text>
  <text x="690" y="1252" font-size="13" fill="#1F1A14" text-anchor="middle">CPU/IO 阻塞走 to_thread</text>
  <text x="690" y="1274" font-size="13" fill="#1F1A14" text-anchor="middle">不阻塞事件循环</text>
  <text x="690" y="1292" font-size="12" fill="#1F1A14" text-anchor="middle" font-style="italic">外部 LLM / 联网也走异步</text>

  <rect x="920" y="1200" width="380" height="100" fill="#FFFFFF" stroke="#1F1A14" stroke-width="2" rx="4"/>
  <text x="1110" y="1228" font-size="15" font-weight="700" fill="#1F1A14" text-anchor="middle">状态隔离</text>
  <text x="1110" y="1252" font-size="13" fill="#1F1A14" text-anchor="middle">AsyncSession 不能跨线程</text>
  <text x="1110" y="1274" font-size="13" fill="#1F1A14" text-anchor="middle">提前缓存 kb.id / slug</text>
  <text x="1110" y="1292" font-size="12" fill="#1F1A14" text-anchor="middle" font-style="italic">避免 MissingGreenlet</text>

  <rect x="1340" y="1200" width="260" height="100" fill="#F61B27" rx="4"/>
  <text x="1470" y="1228" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">失败兜底</text>
